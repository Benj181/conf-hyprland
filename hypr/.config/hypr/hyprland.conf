# ~/.config/hypr/hyprland.conf
# Entry point only. Keep this file thin — everything lives in its own module.
# hardware.conf holds everything specific to this machine (europa).

source = ~/.config/hypr/hardware.conf
source = ~/.config/hypr/general.conf
source = ~/.config/hypr/keybinds.conf
source = ~/.config/hypr/windowrules.conf
source = ~/.config/hypr/autostart.conf

exec-once = gnome-keyring-daemon --start --components=secrets,ssh

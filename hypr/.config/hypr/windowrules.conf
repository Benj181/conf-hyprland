# ~/.config/hypr/windowrules.conf

windowrule = match:class ^(pavucontrol)$, float on
windowrule = match:class ^(pavucontrol)$, size 800 600
windowrule = match:class ^(blueman-manager)$, float on
windowrule = match:class ^(Picture-in-Picture)$, float on
windowrule = match:class ^(Picture-in-Picture)$, pin on

# Nautilus is now $filemanager ($mod+E); float its transient dialogs rather
# than tiling them.
windowrule = match:class ^(org.gnome.Nautilus)$ match:title ^(Preferences|Properties)$, float on

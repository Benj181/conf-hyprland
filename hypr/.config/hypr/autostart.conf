# ~/.config/hypr/autostart.conf

exec-once = waybar
exec-once = mako
exec-once = hyprpaper
exec-once = hypridle

# Polkit authentication agent. Started through its systemd user unit rather
# than an absolute path: the previous hardcoded
# /usr/lib/polkit-kde-authentication-agent-1 did not exist on this system and
# failed silently, so auth prompts never appeared. (The real binary ships at
# /usr/libexec/hyprpolkitagent, but let systemd resolve that.)
exec-once = systemctl --user start hyprpolkitagent

exec-once = wl-paste --watch cliphist store

# ~/.config/hypr/hardware.conf
# Everything specific to this machine (europa) lives here. If a second
# machine ever shows up, this is the only file that needs to differ.
#
# europa: RTX 5070 Ti (Blackwell GB203), nvidia-open (open kernel modules),
#         2x LG UltraGear 2560x1440@180, DP-2 rotated portrait.

# NVIDIA. Blackwell is open-kernel-module only, so there is no proprietary
# variant to account for here.
env = LIBVA_DRIVER_NAME,nvidia
env = GBM_BACKEND,nvidia-drm
env = __GLX_VENDOR_LIBRARY_NAME,nvidia

cursor {
    no_hardware_cursors = false
}

# Both panels top out at 180.06Hz -- confirmed against `hyprctl monitors`
# availableModes. DP-2 is physically rotated 90 degrees (transform 1), which
# is why it occupies 1440px of width starting at -1440.
monitor = DP-3, 2560x1440@180.06, 0x0, 1
monitor = DP-2, 2560x1440@180.06, -1440x0, 1, transform, 1

workspace = 2, monitor:DP-3, default:true
workspace = 1, monitor:DP-2, default:true

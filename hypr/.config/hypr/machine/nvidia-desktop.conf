# ~/.config/hypr/machine/nvidia-desktop.conf
# For: desktop with discrete NVIDIA GPU only (no hybrid/Optimus).
# Requires: proprietary driver 555+ (explicit sync) or open kernel modules
#           on Turing (RTX 20xx) and newer.

env = LIBVA_DRIVER_NAME,nvidia
env = GBM_BACKEND,nvidia-drm
env = __GLX_VENDOR_LIBRARY_NAME,nvidia
env = __GL_VRR_ALLOWED,1

# wlroots cursor rendering can break on NVIDIA without this on some driver
# versions. Try commenting this out first on 555+ -- often no longer needed
# and disabling it gives you hardware cursors (less latency) when it works.
# env = WLR_NO_HARDWARE_CURSORS,1

cursor {
    no_hardware_cursors = false
}


# Single monitor example -- edit to match your actual output name (`hyprctl monitors`)
monitor = DP-3, 2560x1440@144, 0x0, 1
monitor = DP-2, 2560x1440@144, -1440x0, 1, transform, 1

# ~/.config/hypr/machine/laptop-igpu.conf
# For: laptop with Intel or AMD integrated graphics ONLY (no discrete GPU).
# No NVIDIA env vars needed -- standard Mesa driver handles everything.

# Laptop-specific niceties
misc {
    vfr = true                     # variable frame rate, saves battery
}

# Lid / power related bindings (requires swayidle+systemd or similar, adjust as needed)
bindl = , switch:Lid Switch, exec, systemctl suspend

# Example monitor line -- edit to match `hyprctl monitors` output.
# Laptops often benefit from fractional scaling:
monitor = eDP-1, 1920x1080@60, 0x0, 1.25

# ~/.config/hypr/general.conf
# Look, feel and input. Machine-specific bits live in hardware.conf.

general {
    gaps_in = 4
    gaps_out = 8
    border_size = 2
    col.active_border = rgba(89b4faee) rgba(cba6f7ee) 45deg
    col.inactive_border = rgba(45475aaa)
    layout = dwindle
    resize_on_border = true
}

decoration {
    rounding = 10

    blur {
        enabled = true
        size = 6
        passes = 2
        new_optimizations = true
    }

    shadow {
        enabled = true
        range = 12
        render_power = 2
        color = rgba(11111baa)
    }
}

animations {
    enabled = true
    bezier = easeOutQuint, 0.23, 1, 0.32, 1
    bezier = snappy, 0.1, 0.9, 0.1, 1

    animation = windows, 1, 2, snappy
    animation = fade, 1, 2, snappy
    animation = workspaces, 1, 2, snappy
    animation = border, 1, 2, snappy
}

dwindle {
    preserve_split = true
}

input {
    kb_layout = no
    follow_mouse = 1

    # No mouse acceleration. `flat` is libinput's 1:1 profile -- prefer it over
    # force_no_accel, which bypasses libinput entirely and is discouraged
    # upstream. sensitivity 0 is the neutral value, stated explicitly so it
    # reads as deliberate rather than defaulted.
    accel_profile = flat
    sensitivity = 0
}

# QT apps follow qt6ct, which install-themes.sh points at Catppuccin.
env = QT_QPA_PLATFORMTHEME,qt6ct

misc {
    disable_hyprland_logo = true
    force_default_wallpaper = 0
}

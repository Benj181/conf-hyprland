# ~/.config/hypr/hyprpaper.conf
# hyprpaper is launched from autostart.conf. Without this file it starts,
# logs "Monitor <name> has no target: no wp will be created", and paints
# nothing -- which is why there was no wallpaper before.
#
# NOTE: this is hyprpaper >= 0.8 syntax. 0.8 was rewritten on hyprtoolkit and
# replaced the old flat form:
#
#     preload = /path/to.jpg
#     wallpaper = DP-3,/path/to.jpg
#
# with the wallpaper {} blocks below. The old syntax does not error -- it is
# silently ignored and every monitor ends up with no target. Most guides and
# dotfiles online still show the old form.
#
# hyprpaper also does not expand ~ or $HOME here, so paths are absolute.

splash = false

wallpaper {
    monitor = DP-3
    path = /home/baas/hyprland-dotfiles/wallpapers/mocha-landscape.jpg
    fit_mode = cover
}

# DP-2 is rotated 90 degrees, so it gets the portrait image: the wallpaper is
# applied in the monitor's own orientation, and stretching a 16:9 image onto a
# 9:16 panel looks obviously wrong.
wallpaper {
    monitor = DP-2
    path = /home/baas/hyprland-dotfiles/wallpapers/mocha-portrait.jpg
    fit_mode = cover
}

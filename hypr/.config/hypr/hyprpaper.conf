# ~/.config/hypr/hyprpaper.conf
# hyprpaper is launched from autostart.conf. Without this file it starts and
# does nothing, which is why there was no wallpaper before.
#
# Paths are absolute because hyprpaper does not expand ~ in every version;
# $HOME is expanded by hyprpaper itself.

preload = $HOME/hyprland-dotfiles/wallpapers/mocha-landscape.jpg
preload = $HOME/hyprland-dotfiles/wallpapers/mocha-portrait.jpg

# DP-2 is rotated 90 degrees, so it needs the portrait image: the wallpaper is
# applied in the monitor's own (pre-transform) orientation, and stretching a
# 16:9 image onto a 9:16 panel looks obviously wrong.
wallpaper = DP-3, $HOME/hyprland-dotfiles/wallpapers/mocha-landscape.jpg
wallpaper = DP-2, $HOME/hyprland-dotfiles/wallpapers/mocha-portrait.jpg

splash = false
ipc = on

[Settings]
gtk-icon-theme-name=Papirus-Dark
gtk-cursor-theme-name=Adwaita
gtk-cursor-theme-size=24
gtk-font-name=FiraCode Nerd Font 11
gtk-application-prefer-dark-theme=1

# gtk-theme-name is deliberately absent: libadwaita ignores it. Dark mode for
# GTK4 apps comes from the colour-scheme portal setting, which
# install-themes.sh applies via gsettings. Colours come from gtk.css.

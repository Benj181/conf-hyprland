#? Config file for btop v. 1.4.6
# ~/.config/btop/btop.conf
#
# Without this file btop uses its built-in defaults, which means its own
# colours and a solid black background regardless of the terminal theme.

# Catppuccin Mocha, vendored in themes/ next to this file. btop only looks in
# ~/.config/btop/themes and /usr/share/btop/themes, and the distro package
# ships no Catppuccin, so it has to live here.
#
# This must be the bare theme name -- not a path, not with the .theme suffix.
# `color_theme = "themes/catppuccin_mocha.theme"` is silently ignored: btop
# reports no error, falls back to its built-in black default, and the only
# symptom is a black background.
color_theme = "catppuccin_mocha"

# Draw the terminal's background rather than the theme's own main_bg. With
# kitty at background_opacity 1 both look identical (kitty's bg and the theme's
# main_bg are both #1e1e2e), but False is what lets btop inherit terminal
# transparency if opacity is ever lowered.
#
# Note this setting can mask a broken color_theme: with the theme failing to
# load, False still yields a Catppuccin-looking background, because it is
# kitty's. If btop's colours ever look wrong, set this True to see what the
# theme is actually painting.
theme_background = False

truecolor = True
force_tty = False
presets = "cpu:1:default,proc:0:default cpu:0:default,mem:0:default,net:0:default cpu:0:block,net:0:tty"
vim_keys = True
rounded_corners = True
graph_symbol = "braille"
shown_boxes = "cpu mem net proc"
update_ms = 1000

proc_sorting = "cpu lazy"
proc_reversed = False
proc_tree = False
proc_colors = True
proc_gradient = True
proc_per_core = False
proc_mem_bytes = True

cpu_graph_upper = "total"
cpu_graph_lower = "total"
cpu_invert_lower = True
cpu_single_graph = False
cpu_bottom = False
show_uptime = True
check_temp = True
cpu_sensor = "Auto"
show_coretemp = True
temp_scale = "celsius"
base_10_sizes = False
show_cpu_freq = True
clock_format = "%X"
background_update = True
disks_filter = ""
mem_graphs = True
mem_below_net = False
zfs_arc_cached = True
show_swap = True
swap_disk = True
show_disks = True
only_physical = True
use_fstab = True
zfs_hide_datasets = False
disk_free_priv = False
show_io_stat = True
io_mode = False
io_graph_combined = False
io_graph_speeds = ""
net_download = 100
net_upload = 100
net_auto = True
net_sync = True
net_iface = ""
show_battery = True
selected_battery = "Auto"
show_battery_watts = True
log_level = "WARNING"

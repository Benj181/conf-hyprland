# /etc/nwg-hello/hyprland.conf
# The compositor greetd runs the greeter inside. nwg-hello is a GTK3 app and
# needs a wlroots-style compositor for gtk-layer-shell, so Hyprland hosts it.
#
# Installed by scripts/install-greeter.sh. This is NOT the user session config
# -- it runs as _greetd, which cannot read /home/baas (mode 750), so it cannot
# source anything from ~/.config/hypr/. Monitor and NVIDIA settings are
# therefore duplicated from hypr/.config/hypr/hardware.conf rather than
# shared. If you re-arrange monitors there, change them here too.

# Must match hardware.conf. If the greeter's idea of the layout disagrees with
# the session's, the login form lands on the wrong panel or off-screen.
monitor = DP-3, 2560x1440@180.06, 0x0, 1
monitor = DP-2, 2560x1440@180.06, -1440x0, 1, transform, 1

# NVIDIA. Blackwell is open-kernel-module only. Without these the greeter can
# come up on llvmpipe (software rendering) or not at all.
env = LIBVA_DRIVER_NAME,nvidia
env = GBM_BACKEND,nvidia-drm
env = __GLX_VENDOR_LIBRARY_NAME,nvidia

cursor {
    no_hardware_cursors = false
}

misc {
    disable_hyprland_logo = true
    disable_splash_rendering = true

    # nwg-hello.json sets "monitor_nums": [1], so the greeter only puts a
    # surface on DP-3 and DP-2 shows the bare compositor background. This is
    # what DP-3 actually renders -- the wallpaper's mean colour composited
    # under the CSS overlay rgba(30,30,46,0.4) -- so the portrait panel reads
    # as part of the same screen rather than as a dead output.
    background_color = rgb(292b3f)
}

# The greeter is on screen for a few seconds and is not a place to be cute.
animations {
    enabled = false
}

# Start the greeter, and tear the whole compositor down the moment it exits so
# greetd can hand the VT to the real session. Without the `hyprctl dispatch
# exit`, Hyprland lingers after login and greetd waits forever on a compositor
# with nothing in it.
exec-once = nwg-hello; hyprctl dispatch exit

# Catppuccin Mocha, pulled in as a git submodule (see repo README for setup)
include themes/catppuccin/kitty/mocha.conf

# Personal overrides on top of the upstream theme.
# Keep this section short: only keys deliberately different from
# Catppuccin, so upstream updates still apply to everything else.
# background               #0A0E14
# tab_bar_background       #0A0E14
# active_tab_background    #131B24
# inactive_tab_background  #0A0E14
# active_tab_foreground    #E6E1CF
# inactive_tab_foreground  #626A73

# fonts
font_family      FiraCode Nerd Font Mono
bold_font        auto
italic_font      auto
bold_italic_font auto
font_size        12.0

allow_remote_control yes
listen_on unix:@kitty

# window
window_padding_width 12
confirm_os_window_close 0

# visual
background_opacity 1

# tab bar
tab_bar_edge top
tab_bar_style powerline
tab_bar_min_tabs 1

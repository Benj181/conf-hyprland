# ~/.config/hypr/hypridle.conf
# Idle management. europa is a desktop, so there is deliberately no
# suspend/lid handling here -- DPMS off is the end state.

general {
    lock_cmd = pidof hyprlock || hyprlock       # avoid stacking lock instances
    before_sleep_cmd = loginctl lock-session
    after_sleep_cmd = hyprctl dispatch dpms on  # without this the screen can
                                                # stay black on wake
}

# 5 min: dim. Uses brightnessctl only if a backlight exists -- there is none on
# this desktop, so this listener is intentionally omitted rather than left in
# as a no-op. See keybinds.conf for the same reasoning on brightness keys.

# 10 min: lock
listener {
    timeout = 600
    on-timeout = loginctl lock-session
}

# 15 min: screens off
listener {
    timeout = 900
    on-timeout = hyprctl dispatch dpms off
    on-resume = hyprctl dispatch dpms on
}

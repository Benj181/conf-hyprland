# ~/.config/hypr/hyprlock.conf
# Catppuccin Mocha lock screen.
#
# Test this with a spare TTY reachable (Ctrl+Alt+F3) before trusting hypridle
# to trigger it unattended -- a broken lock screen locks you out.

general {
    hide_cursor = true
    ignore_empty_input = true
}

background {
    monitor =
    path = $HOME/hyprland-dotfiles/wallpapers/mocha-landscape.jpg
    blur_passes = 3
    blur_size = 8
    brightness = 0.6
}

# Time
label {
    monitor =
    text = cmd[update:1000] date +"%H:%M"
    color = rgba(cdd6f4ff)
    font_size = 96
    font_family = FiraCode Nerd Font
    position = 0, 180
    halign = center
    valign = center
}

# Date
label {
    monitor =
    text = cmd[update:60000] date +"%A, %d %B"
    color = rgba(a6adc8ff)
    font_size = 20
    font_family = FiraCode Nerd Font
    position = 0, 100
    halign = center
    valign = center
}

input-field {
    monitor =
    size = 320, 52
    outline_thickness = 2
    dots_size = 0.28
    dots_spacing = 0.3
    dots_center = true
    rounding = 10

    outer_color = rgba(cba6f7ff)
    inner_color = rgba(1e1e2eee)
    font_color = rgba(cdd6f4ff)
    check_color = rgba(89b4faff)
    fail_color = rgba(f38ba8ff)

    placeholder_text = <span foreground="##a6adc8">Password</span>
    fail_text = <span foreground="##f38ba8">$FAIL ($ATTEMPTS)</span>

    fade_on_empty = false
    position = 0, -40
    halign = center
    valign = center
}
